        /* ─── Canvas ─── */
        canvas {

            width: 100vw;
            height: 100vh;

            letter-spacing: 6px;
            color: #555;
            z-index: 300;
        }

        /* ─── INITIAL HIDDEN STATE & ANIMATIONS ─── */
        .gradient-overlay, nav, .panel {
            opacity: 0;
            transition: opacity 2s ease, transform 2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        nav { transform: translateY(-20px); }
        .panel { transform: translateY(30px); }

        body.show-ui .gradient-overlay { opacity: 1; }
        body.show-ui nav { opacity: 1; transform: translateY(0); }
        body.show-ui .panel { opacity: 1; transform: translateY(0); }

<!-- ─────────────── CANVAS PARTICLE ENGINE ─────────────── -->
<script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const loadEl = document.getElementById('loading');

    let particles = [];
    let animationId = null;
    const mouse = { x: null, y: null, radius: 180, radiusSq: 180 * 180 };

    window.addEventListener('mousemove',  e => { 
        mouse.x = e.clientX; 
        mouse.y = e.clientY; 
        if (!animationId && particles.length > 0) animationId = requestAnimationFrame(draw);
    });
    window.addEventListener('mouseout',   () => { mouse.x = null; mouse.y = null; });
    window.addEventListener('touchmove',  e => { 
        mouse.x = e.touches[0].clientX; 
        mouse.y = e.touches[0].clientY; 
        if (!animationId && particles.length > 0) animationId = requestAnimationFrame(draw);
    }, { passive: true });
    window.addEventListener('touchend',   () => { mouse.x = null; mouse.y = null; });

    class Particle {
        constructor(x, y, ch, color, cw, ch_screen) {
            this.baseX = x;
            this.baseY = y;
            this.ch = ch;
            this.color = color;
            this.density = Math.random() * 20 + 5;

            // Start scattered randomly across the screen for the entrance animation
            this.x = (Math.random() - 0.5) * cw * 1.5 + cw / 2;
            this.y = (Math.random() - 0.5) * ch_screen * 1.5 + ch_screen / 2;
            
            // Random easing for organic, non-uniform assembly
            this.easing = Math.random() * 0.04 + 0.02; // between 0.02 and 0.06
        }
    }

    async function init() {
        try {
            const [textRes, img] = await Promise.all([
                fetch('ascii-fallen-angel.txt'),
                new Promise((res, rej) => {
                    const i = new Image();
                    i.onload = () => res(i);
                    i.onerror = rej;
                    i.src = 'Fallen_Angel_(Alexandre_Cabanel)_crop.jpg';
                })
            ]);

            const text  = await textRes.text();
            const lines = text.split('\n');

            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;

            const off = document.createElement('canvas');
            off.width  = canvas.width;
            off.height = canvas.height;
            const offCtx = off.getContext('2d');
            offCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const px = offCtx.getImageData(0, 0, canvas.width, canvas.height).data;

            const rows = lines.length;
            let   cols = 0;
            for (const l of lines) if (l.length > cols) cols = l.length;

            const cw = canvas.width  / cols;
            const ch = canvas.height / rows;

            particles = [];
            for (let r = 0; r < rows; r++) {
                const line = lines[r];
                for (let c = 0; c < line.length; c++) {
                    const char = line[c];
                    if (char === ' ') continue;
                    const posX = c * cw + cw / 2;
                    const posY = r * ch + ch / 2;
                    const ix   = Math.min(Math.floor(posX), canvas.width  - 1);
                    const iy   = Math.min(Math.floor(posY), canvas.height - 1);
                    const i4   = (iy * canvas.width + ix) * 4;
                    
                    // PERFORMANCE BOOST: Skip extremely dark pixels that are invisible on a black background
                    if (px[i4] < 8 && px[i4+1] < 8 && px[i4+2] < 8) continue;

                    particles.push(new Particle(posX, posY, char,
                        `rgb(${px[i4]},${px[i4+1]},${px[i4+2]})`, canvas.width, canvas.height));
                }
            }

            // PERFORMANCE BOOST: Sort array by color. This minimizes expensive ctx.fillStyle state changes per frame.
            particles.sort((a, b) => a.color.localeCompare(b.color));

            loadEl.style.display = 'none';
            if (!animationId) animationId = requestAnimationFrame(draw);

            // COLOR REVEAL ANIMATION: Wait 1.5s then smoothly transition canvas from grayscale to full color
            setTimeout(() => {
                canvas.style.filter = 'grayscale(0%)';
            }, 1500);

            // Trigger UI reveal after particles assemble
            setTimeout(() => {
                document.body.classList.add('show-ui');
            }, 2500); // Wait 2.5s for the majestic particle assembly

        } catch(e) {
            loadEl.textContent = 'ERROR LOADING ASSETS';
            console.error(e);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const rows = 77, cols = 270;
        const cw = canvas.width / cols, ch = canvas.height / rows;
        const fs = Math.min(cw * 1.8, ch * 1.2);
        ctx.font = `bold ${fs}px monospace`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';

        let last = '';
        let stillMoving = false;

        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            let moving = false;

            // Inlined update physics for maximum execution speed
            if (mouse.x !== null) {
                const dx = mouse.x - p.x, dy = mouse.y - p.y;
                const distSq = dx*dx + dy*dy;
                if (distSq < mouse.radiusSq) {
                    const d = Math.sqrt(distSq);
                    const f = (mouse.radius - d) / mouse.radius;
                    p.x -= (dx/d) * f * p.density * 1.5;
                    p.y -= (dy/d) * f * p.density * 1.5;
                    moving = true;
                }
            }
            
            const diffX = p.baseX - p.x;
            const diffY = p.baseY - p.y;
            
            if (Math.abs(diffX) > 0.05 || Math.abs(diffY) > 0.05) {
                p.x += diffX * p.easing;
                p.y += diffY * p.easing;
                moving = true;
            } else if (mouse.x === null) {
                // Snap exactly to target coordinate when resting
                p.x = p.baseX;
                p.y = p.baseY;
            }

            if (moving) stillMoving = true;

            if (p.color !== last) { 
                ctx.fillStyle = p.color; 
                last = p.color; 
            }
            
            // Fast integer casting (~~) avoids subpixel text blur and vastly improves render speed
            ctx.fillText(p.ch, ~~p.x, ~~p.y);
        }

        if (mouse.x !== null) stillMoving = true;

        if (stillMoving) {
            animationId = requestAnimationFrame(draw);
        } else {
            // Sleep mode: CPU drops to 0% when animation finishes and mouse is inactive!
            animationId = null;
        }
    }

    let rsz;
    window.addEventListener('resize', () => {
        clearTimeout(rsz);
        rsz = setTimeout(() => { loadEl.style.display = 'block'; init(); }, 400);
    });

    init();
</script>
