<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARSH SINGH</title>
    <!-- Use JetBrains Mono for the crisp, terminal look -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            background: #050505;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            color: #fff;
        }

        /* ─── Canvas ─── */
        canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
            will-change: transform;
            contain: strict;
        }

        /* ─── INITIAL HIDDEN STATE & ANIMATIONS ─── */
        .gradient-overlay, nav, .panel {
            opacity: 0;
            transition: opacity 2s ease, transform 2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        nav { transform: translateY(-20px); }
        .panel { transform: translateY(30px); }

        body.show-ui .gradient-overlay { opacity: 1; }
        body.show-ui nav { opacity: 1; transform: translateY(0); }
        body.show-ui .panel { opacity: 1; transform: translateY(0); }

        /* ─── Gradient Overlay ─── */
        /* This creates the solid black left side that fades into the ASCII art */
        .gradient-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            pointer-events: none;
            background: linear-gradient(to right, 
                rgba(0, 0, 0, 0.98) 0%, 
                rgba(0, 0, 0, 0.85) 40%, 
                rgba(0, 0, 0, 0.4) 70%, 
                rgba(0, 0, 0, 0) 100%);
        }

        /* ─── NAVBAR ─── */
        nav {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 200;
            pointer-events: none;
            background: linear-gradient(to bottom, 
                rgba(0, 0, 0, 0.95) 0%, 
                rgba(0, 0, 0, 0.6) 60%, 
                rgba(0, 0, 0, 0) 100%);
        }
        nav * { pointer-events: auto; }

        .nav-brand {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: #fff;
        }
        .nav-brand .prompt { color: #d48a56; }

        .nav-links {
            display: flex;
            gap: 30px;
        }
        .nav-links a {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #888;
            text-decoration: none;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .nav-links a.active {
            color: #fff;
            border-bottom-color: #d48a56;
        }
        .nav-links a:hover { color: #fff; }

        /* ─── LEFT PANEL ─── */
        .panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 700px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 0 0 50px;
            z-index: 100;
            pointer-events: none;
        }
        .panel > * { pointer-events: auto; }

        .hello {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #d48a56;
            margin-bottom: 12px;
            font-weight: 700;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 8px;
            line-height: 1.2;
            color: #fff;
            margin-bottom: 15px;
        }

        .sub {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .rule {
            width: 40px;
            height: 2px;
            background: #444;
            margin-bottom: 20px;
        }

        .bio {
            font-size: 0.8rem;
            line-height: 1.6;
            color: #888;
            max-width: 380px;
            margin-bottom: 25px;
        }

        /* ─── BUTTONS ─── */
        .btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            width: 260px;
            height: 42px;
            border: 1px solid #222;
            border-radius: 4px;
            color: #888;
            text-decoration: none;
            background: rgba(10,10,10,0.6);
            transition: all 0.2s ease;
        }
        .btn:hover {
            border-color: #555;
            background: rgba(30,30,30,0.8);
            color: #fff;
        }

        .btn .ic {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #222;
            background: rgba(15,15,15,0.6);
            color: #888;
            transition: all 0.2s ease;
        }
        .btn:hover .ic {
            color: #fff;
            border-right-color: #555;
        }

        .btn .lbl {
            flex: 1;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding-left: 15px;
        }

        .btn .arr {
            padding-right: 15px;
            font-size: 1rem;
            color: #555;
            transition: transform 0.2s ease;
        }
        .btn:hover .arr {
            color: #fff;
            transform: translateX(6px);
        }

        /* ─── SOCIAL ─── */
        .social {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .social .sc-label {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #555;
            margin-right: 10px;
            font-weight: 700;
        }
        .social a {
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: color 0.2s;
        }
        .social a:hover { color: #fff; }

        @media (max-width: 1024px) {
            .gradient-overlay { background: rgba(5,5,5,0.9); }
            .panel { width: 100%; padding: 0 30px; }
            h1 { font-size: 2.2rem; letter-spacing: 6px; }
            nav { padding: 0 30px; height: 60px; }
            .nav-links { gap: 15px; }
        }
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; letter-spacing: 4px; }
            .nav-links { display: none; }
            .btn { width: 240px; }
        }
    </style>
</head>

<!-- ─────────────── CANVAS PARTICLE ENGINE ─────────────── -->
<script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    let particles = [];
    let gridRows = 0;
    let gridCols = 0;
    let animationId = null;
    
    // Force supersampling (minimum 2x) to create a gorgeous dense mesh effect instead of jagged dots
    const dpr = Math.max(2, window.devicePixelRatio || 1);
    const mouse = { x: null, y: null, radius: 180 * dpr, radiusSq: (180 * dpr) * (180 * dpr) };

    window.addEventListener('mousemove',  e => { 
        mouse.x = e.clientX * dpr; 
        mouse.y = e.clientY * dpr; 
        if (!animationId && particles.length > 0) animationId = requestAnimationFrame(draw);
    });
    window.addEventListener('mouseout',   () => { mouse.x = null; mouse.y = null; });
    window.addEventListener('touchmove',  e => { 
        mouse.x = e.touches[0].clientX * dpr; 
        mouse.y = e.touches[0].clientY * dpr; 
        if (!animationId && particles.length > 0) animationId = requestAnimationFrame(draw);
    }, { passive: true });
    window.addEventListener('touchend',   () => { mouse.x = null; mouse.y = null; });

    class Particle {
        constructor(x, y, ch, color, cw, ch_screen) {
            this.baseX = x;
            this.baseY = y;
            this.ch = ch;
            this.color = color;
            this.density = Math.random() * 20 + 5;

            // Start scattered randomly across the screen for the entrance animation
            this.x = (Math.random() - 0.5) * cw * 1.5 + cw / 2;
            this.y = (Math.random() - 0.5) * ch_screen * 1.5 + ch_screen / 2;
            
            // Random easing for organic, non-uniform assembly
            this.easing = Math.random() * 0.04 + 0.02; // between 0.02 and 0.06
        }
    }

    async function init() {
        try {
            const text = document.getElementById('ascii-data').textContent.replace(/^\n/, ''); // remove leading newline if present
            const lines = text.split('\n');

            const img = await new Promise((res, rej) => {
                const i = new Image();
                i.onload = () => res(i);
                i.onerror = rej;
                i.src = 'data:image/jpeg;base64,' + document.getElementById('img-data').textContent.trim();
            });

            gridRows = lines.length;
            gridCols = 0;
            for (const l of lines) if (l.length > gridCols) gridCols = l.length;

            canvas.width  = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;

            const off = document.createElement('canvas');
            // PERFORMANCE: Shrink offscreen canvas to match grid exactly (e.g. 270x77) instead of 4K screen. 
            // This makes getImageData instant and uses almost zero memory.
            off.width  = gridCols;
            off.height = gridRows;
            const offCtx = off.getContext('2d');
            offCtx.drawImage(img, 0, 0, gridCols, gridRows);
            const px = offCtx.getImageData(0, 0, gridCols, gridRows).data;

            // Fix the ASCII grid to a perfect 16:9 aspect ratio bounding box that "covers" the screen
            let boxWidth = canvas.width;
            let boxHeight = canvas.width * (9 / 16);
            if (boxHeight < canvas.height) {
                boxHeight = canvas.height;
                boxWidth = canvas.height * (16 / 9);
            }
            
            const cw = boxWidth / gridCols;
            const ch = boxHeight / gridRows;
            
            // Center the 16:9 bounding box on the screen
            const offsetX = (canvas.width - boxWidth) / 2;
            const offsetY = (canvas.height - boxHeight) / 2;

            particles = [];
            for (let r = 0; r < gridRows; r++) {
                const line = lines[r];
                for (let c = 0; c < line.length; c++) {
                    const char = line[c];
                    if (char === ' ') continue;
                    
                    const posX = offsetX + c * cw + cw / 2;
                    const posY = offsetY + r * ch + ch / 2;
                    
                    // Directly map the grid row/col to the tiny offscreen canvas pixels
                    const i4 = (r * gridCols + c) * 4;
                    
                    // PERFORMANCE BOOST: Aggressive culling of dark shadow pixels to drastically reduce rendering load
                    if (px[i4] < 28 && px[i4+1] < 28 && px[i4+2] < 28) continue;

                    particles.push(new Particle(posX, posY, char,
                        `rgb(${px[i4]},${px[i4+1]},${px[i4+2]})`, canvas.width, canvas.height));
                }
            }

            // PERFORMANCE BOOST: Simple string comparison instead of localeCompare. 
            // localeCompare on 7,000 items freezes the main thread, this is instant.
            particles.sort((a, b) => (a.color < b.color ? -1 : 1));

            if (!animationId) animationId = requestAnimationFrame(draw);

            // Trigger UI reveal after particles assemble
            setTimeout(() => {
                document.body.classList.add('show-ui');
            }, 2500); // Wait 2.5s for the majestic particle assembly

        } catch(e) {
            console.error(e);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let boxWidth = canvas.width;
        let boxHeight = canvas.width * (9 / 16);
        if (boxHeight < canvas.height) {
            boxHeight = canvas.height;
            boxWidth = canvas.height * (16 / 9);
        }
        
        const cw = boxWidth / gridCols;
        const ch = boxHeight / gridRows;
        const fs = Math.min(cw * 1.8, ch * 1.2);
        ctx.font = `bold ${fs}px 'JetBrains Mono', monospace`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';

        let last = '';
        let stillMoving = false;

        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            let moving = false;

            // Inlined update physics for maximum execution speed
            if (mouse.x !== null) {
                const dx = mouse.x - p.x;
                // AABB (Bounding Box) Fast Check: Only do math if particle is roughly near the mouse
                if (dx > -mouse.radius && dx < mouse.radius) {
                    const dy = mouse.y - p.y;
                    if (dy > -mouse.radius && dy < mouse.radius) {
                        const distSq = dx*dx + dy*dy;
                        if (distSq < mouse.radiusSq) {
                            const d = Math.sqrt(distSq);
                            const f = (mouse.radius - d) / mouse.radius;
                            p.x -= (dx/d) * f * p.density * 1.5;
                            p.y -= (dy/d) * f * p.density * 1.5;
                            moving = true;
                        }
                    }
                }
            }
            
            const diffX = p.baseX - p.x;
            const diffY = p.baseY - p.y;
            
            if (Math.abs(diffX) > 0.05 || Math.abs(diffY) > 0.05) {
                p.x += diffX * p.easing;
                p.y += diffY * p.easing;
                moving = true;
            } else if (mouse.x === null) {
                // Snap exactly to target coordinate when resting
                p.x = p.baseX;
                p.y = p.baseY;
            }

            if (moving) stillMoving = true;

            if (p.color !== last) { 
                ctx.fillStyle = p.color; 
                last = p.color; 
            }
            
            // Fast integer casting (~~) avoids subpixel text blur and vastly improves render speed
            ctx.fillText(p.ch, ~~p.x, ~~p.y);
        }

        if (mouse.x !== null) stillMoving = true;

        if (stillMoving) {
            animationId = requestAnimationFrame(draw);
        } else {
            // Sleep mode: CPU drops to 0% when animation finishes and mouse is inactive!
            animationId = null;
        }
    }

    let rsz;
    window.addEventListener('resize', () => {
        clearTimeout(rsz);
        rsz = setTimeout(() => { init(); }, 400);
    });

    init();
</script>
